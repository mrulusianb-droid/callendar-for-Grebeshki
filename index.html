<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grebeshki | Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .event-card {
            animation: slideIn 0.4s ease-out forwards;
            opacity: 0;
        }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        input, textarea {
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .gradient-text {
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2 tracking-tight gradient-text">Grebeshki</h1>
            <p class="text-slate-400 font-light uppercase tracking-widest text-xs">Internal Event Log</p>
        </header>
        
        <div class="glass rounded-2xl p-6 mb-10">
            <h2 class="text-lg font-semibold mb-5 flex items-center">
                <span class="mr-2">📝</span> Новая запись
            </h2>
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="eventDate" class="w-full p-3 rounded-xl bg-slate-900/50 border border-slate-700 focus:outline-none" placeholder="Дата (напр. 25.03)">
                    <input type="text" id="author" class="w-full p-3 rounded-xl bg-slate-900/50 border border-slate-700 focus:outline-none" placeholder="Ваше имя">
                </div>
                <textarea id="eventDescription" class="w-full p-3 rounded-xl bg-slate-900/50 border border-slate-700 h-28 focus:outline-none resize-none" placeholder="Что произошло в ресторане?"></textarea>
                <button onclick="addEvent()" id="addBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-white shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                    Опубликовать событие
                </button>
            </div>
        </div>

        <div id="eventsList" class="space-y-6">
            <h2 class="text-xl font-bold mb-4 flex items-center px-2">
                <span class="mr-2">🕒</span> Хронология
            </h2>
            <div id="loading" class="text-center py-10 text-slate-500">Загрузка ленты...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "ВСТАВЬ_СВОЙ_API_KEY_ЗДЕСЬ", 
          authDomain: "grebeshki-66414.firebaseapp.com",
          projectId: "grebeshki-66414",
          storageBucket: "grebeshki-66414.appspot.com",
          messagingSenderId: "414605954652",
          appId: "1:414605954652:web:65e109d945f3c0512f456c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.addEvent = async () => {
            const date = document.getElementById('eventDate').value;
            const author = document.getElementById('author').value;
            const desc = document.getElementById('eventDescription').value;
            const btn = document.getElementById('addBtn');

            if (!date || !author || !desc) {
                alert("Пожалуйста, заполните все поля!");
                return;
            }

            btn.disabled = true;
            btn.style.opacity = '0.7';
            btn.innerText = "Сохраняем...";

            try {
                await addDoc(collection(db, "journal"), {
                    date: date,
                    author: author,
                    description: desc,
                    createdAt: serverTimestamp()
                });
                document.getElementById('eventDescription').value = "";
            } catch (e) {
                alert("Ошибка! Проверь права доступа.");
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.innerText = "Опубликовать событие";
            }
        };

        const q = query(collection(db, "journal"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('eventsList');
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
            
            const header = '<h2 class="text-xl font-bold mb-4 flex items-center px-2"><span class="mr-2">🕒</span> Хронология</h2>';
            list.innerHTML = header;
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'event-card glass p-5 rounded-2xl relative overflow-hidden';
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-xs font-bold text-blue-400 bg-blue-400/10 px-3 py-1 rounded-full border border-blue-400/20">
                            📅 ${data.date}
                        </span>
                        <span class="text-xs text-slate-400 italic">
                            от ${data.author}
                        </span>
                    </div>
                    <p class="text-slate-200 leading-relaxed">${data.description}</p>
                    <div class="absolute top-0 right-0 w-24 h-24 bg-blue-500/5 blur-3xl rounded-full -mr-10 -mt-10"></div>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
