<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grebeshki | Mono</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }
        .mono-card { 
            background: #0a0a0a; 
            border: 1px solid #262626; 
            transition: all 0.3s ease;
        }
        .mono-card:hover { border-color: #525252; }
        
        input, textarea {
            background: #0a0a0a !important;
            border: 1px solid #262626 !important;
            color: white !important;
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus {
            border-color: #ffffff !important;
            outline: none;
        }
        .btn-white {
            background: #ffffff;
            color: #000000;
            transition: all 0.2s ease;
        }
        .btn-white:hover { background: #e5e5e5; transform: translateY(-1px); }
        .btn-delete {
            color: #525252;
            transition: color 0.2s;
        }
        .btn-delete:hover { color: #ffffff; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-xl mx-auto">
        <header class="mb-12 border-b border-zinc-800 pb-6">
            <h1 class="text-3xl font-light tracking-tighter uppercase">Grebeshki <span class="font-bold">Journal</span></h1>
        </header>
        
        <div class="space-y-4 mb-16">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="eventDate" class="p-3 rounded-none text-sm" placeholder="ДАТА">
                <input type="text" id="author" class="p-3 rounded-none text-sm" placeholder="АВТОР">
            </div>
            <textarea id="eventDescription" class="w-full p-3 rounded-none text-sm h-24 resize-none" placeholder="ОПИСАНИЕ СОБЫТИЯ..."></textarea>
            <button onclick="addEvent()" id="addBtn" class="w-full btn-white py-4 text-xs font-bold uppercase tracking-widest">
                Добавить запись
            </button>
        </div>

        <div id="eventsList" class="space-y-8">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBXSuqxxrSO3Vu_HuekLOtTcHucdWUalYI", 
          authDomain: "grebeshki-66414.firebaseapp.com",
          projectId: "grebeshki-66414",
          storageBucket: "grebeshki-66414.appspot.com",
          messagingSenderId: "414605954652",
          appId: "1:414605954652:web:65e109d945f3c0512f456c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция удаления
        window.deleteEntry = async (id) => {
            if(confirm("Удалить эту запись навсегда?")) {
                try {
                    await deleteDoc(doc(db, "journal", id));
                } catch (e) { alert("Ошибка при удалении"); }
            }
        };

        // Функция добавления
        window.addEvent = async () => {
            const date = document.getElementById('eventDate').value;
            const author = document.getElementById('author').value;

            const desc = document.getElementById('eventDescription').value;
            const btn = document.getElementById('addBtn');

            if (!date || !author || !desc) return alert("Заполни все поля");

            btn.disabled = true;
            btn.innerText = "СОХРАНЕНИЕ...";

            try {
                await addDoc(collection(db, "journal"), {
                    date: date,
                    author: author,
                    description: desc,
                    createdAt: serverTimestamp()
                });
                document.getElementById('eventDescription').value = "";
            } catch (e) { alert("Ошибка доступа"); }
            finally { 
                btn.disabled = false; 
                btn.innerText = "ДОБАВИТЬ ЗАПИСЬ"; 
            }
        };

        // Рендеринг списка
        const q = query(collection(db, "journal"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('eventsList');
            list.innerHTML = "";
            
            snapshot.forEach((snap) => {
                const data = snap.data();
                const id = snap.id;
                const div = document.createElement('div');
                div.className = 'mono-card p-6 animate-fade relative group';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="text-[10px] tracking-[0.2em] uppercase text-zinc-500">
                            ${data.date} // ${data.author}
                        </div>
                        <button onclick="deleteEntry('${id}')" class="btn-delete text-lg leading-none opacity-0 group-hover:opacity-100 transition-opacity">
                            &times;
                        </button>
                    </div>
                    <p class="text-zinc-200 text-sm leading-relaxed font-light">${data.description}</p>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
