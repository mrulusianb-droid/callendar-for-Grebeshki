<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grebeshki - Staff Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .btn { background: #3b82f6; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center">Гребешки: Заказ стаффа</h1>
        
        <div class="card">
            <label class="block mb-2 text-sm">Кто заказывает?</label>
            <input type="text" id="staffName" class="w-full p-2 rounded bg-slate-700 border-none mb-4" placeholder="Имя">
            
            <label class="block mb-2 text-sm">Что готовим?</label>
            <textarea id="orderText" class="w-full p-2 rounded bg-slate-700 border-none h-24" placeholder="Например: Паста 2шт, без лука"></textarea>
            
            <button onclick="sendOrder()" id="sendBtn" class="w-full btn mt-4">Отправить на кухню</button>
        </div>

        <div id="status" class="text-center text-sm text-gray-400"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Твой конфиг из Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyBXSuqxxrSO3Vu_HuekLOtTcHucdWUalYI", 
          authDomain: "grebeshki-66414.firebaseapp.com",
          projectId: "grebeshki-66414",
          storageBucket: "grebeshki-66414.appspot.com",
          messagingSenderId: "414605954652",
          appId: "1:414605954652:web:65e109d945f3c0512f456c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.sendOrder = async () => {
            const name = document.getElementById('staffName').value;
            const text = document.getElementById('orderText').value;
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');

            if (!name || !text) {
                alert("Заполни все поля!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Отправка...";

            try {
                await addDoc(collection(db, "orders"), {
                    staffName: name,
                    order: text,
                    status: "new",
                    timestamp: serverTimestamp()
                });
                status.innerText = "✅ Заказ улетел!";
                document.getElementById('orderText').value = "";
            } catch (e) {
                console.error(e);
                status.innerText = "❌ Ошибка! Проверь Rules в Firebase.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Отправить на кухню";
            }
        };
    </script>
</body>
</html>
